<div class="parts-table">
    <h2>Items</h2>

    <mat-form-field appearance="outline" class="search-bar">
        <mat-label>Search Parts</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Type to filter parts">
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" matSort class="parts-table-table">
        <ng-container matColumnDef="partsId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Part ID </th>
            <td mat-cell *matCellDef="let row"> {{row.partsId}} </td>
        </ng-container>

        <ng-container matColumnDef="partsDesc">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Parts Description </th>
            <td mat-cell *matCellDef="let row"> {{row.partsDesc}} </td>
        </ng-container>

        <ng-container matColumnDef="quantity">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Quantity </th>
            <td mat-cell *matCellDef="let row"> {{row.quantity}} </td>
        </ng-container>

        <ng-container matColumnDef="image">
            <th mat-header-cell *matHeaderCellDef> Image </th>
            <td mat-cell *matCellDef="let row">
                <img *ngIf="row.imageBase64"
                     [src]="'data:image/png;base64,' + row.imageBase64"
                     alt="Part Image"
                     class="table-image" />
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let row">
                <button mat-button color="primary" (click)="editPart(row)">Edit</button>
                <button mat-button color="warn" (click)="deletePart(row.partsId)">Delete</button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="row-hover"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
    <button mat-raised-button color="accent" (click)="addPart()">Add Part</button>
</div>
