<h1 mat-dialog-title>
    {{ mode === 'add' ? 'Add Part' : 'Edit Part' }}
</h1>

<div mat-dialog-content>
    <form [formGroup]="partForm">
        <ng-container *ngIf="mode === 'add'; else productReadonly">
            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Product</mat-label>
                <mat-select formControlName="productId">
                    <mat-option *ngFor="let product of productSummaries" [value]="product.productId">
                        {{ product.productDesc }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </ng-container>
        <ng-template #productReadonly>
            <div class="readonly-field">
                <strong>Product:</strong> {{ data.part?.productId }}
            </div>
        </ng-template>

        <ng-container *ngIf="mode === 'add'; else partsReadonly">
            <mat-form-field appearance="fill" class="full-width">
                <mat-label>Part Description</mat-label>
                <mat-select formControlName="partsDesc">
                    <mat-option *ngFor="let part of availableParts" [value]="part">
                        {{ part }}
                    </mat-option>
                </mat-select>
            </mat-form-field>
        </ng-container>
        <ng-template #partsReadonly>
            <div class="readonly-field">
                <strong>Part Description:</strong> {{ data.part?.partsDesc }}
            </div>
        </ng-template>


        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity" />
        </mat-form-field>

        <div>
            <label for="fileUpload">Upload Image:</label>
            <input type="file" id="fileUpload" (change)="onFileSelected($event)" />
        </div>
    </form>
</div>

<div mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancel</button>
    <button mat-raised-button color="primary" (click)="save()">Save</button>
</div>
