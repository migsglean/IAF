<div class="container">
  <div class="card">
    <h2>Forgot Password</h2>

    <form (ngSubmit)="onForgotPassword()" #forgotForm="ngForm">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Enter your username</label>
        <input type="text"
               id="username"
               name="username"
               [(ngModel)]="forgotData.username"
               required />
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="!forgotForm.valid">
        Reset Password
      </button>
    </form>
  </div>
</div>
