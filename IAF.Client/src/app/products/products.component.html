<div class="product-table">
    <h2>Items</h2>

    <!-- Search bar -->
    <mat-form-field appearance="outline" class="search-bar">
        <mat-label>Search</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Type to filter products">
    </mat-form-field>

    <!-- Data table -->
    <table mat-table [dataSource]="dataSource" matSort class="custom-table">

        <!-- Product ID Column -->
        <ng-container matColumnDef="productId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Product ID </th>
            <td mat-cell *matCellDef="let row" (click)="onRowClick(row)"> {{row.productId}} </td>
        </ng-container>

        <!-- Product Description Column -->
        <ng-container matColumnDef="productDesc">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Product Description </th>
            <td mat-cell *matCellDef="let row" (click)="onRowClick(row)"> {{row.productDesc}} </td>
        </ng-container>

        <!-- Forecasted Produce Count Column -->
        <ng-container matColumnDef="forecastedProducedCount">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Forecasted Produce Count </th>
            <td mat-cell *matCellDef="let row" (click)="onRowClick(row)"> {{row.forecastedProducedCount}} </td>
        </ng-container>

        <!-- Header and Row Declarations -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="clickable-row"></tr>
    </table>

    <!-- Pagination -->
    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
